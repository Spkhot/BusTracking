<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#991b1b">
  <title>Conductor Login - KSRTC</title>
  <meta name="description" content="KSRTC Nippani Depot conductor login portal.">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-visual">
      <div class="login-visual-content">
        <div style="font-size:64px;margin-bottom:20px">🚌</div>
        <h2>KSRTC Nippani</h2>
        <p>Karnataka State Road Transport Corporation — Conductor Portal</p>
      </div>
    </div>
    <div class="login-form-side">
      <div class="login-card">
        <div class="login-logo">🚌</div>
        <h1 class="login-title">Conductor Login</h1>
        <p class="login-subtitle">KSRTC Nippani Depot</p>

        <div id="alertBox" style="display:none"></div>

        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-control" id="username" type="text" placeholder="Your username" autocomplete="username" inputmode="text"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>

        <button class="btn btn-primary btn-block btn-lg" id="loginBtn" onclick="login()">Login</button>

        <div style="text-align:center;margin-top:24px">
          <a href="/" style="font-size:14px;color:var(--primary)">← Back to Home</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    if (localStorage.getItem('conductorToken')) window.location.href = '/conductor/dashboard';
    document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) { showAlert('Enter username and password.','error'); return; }
      const btn = document.getElementById('loginBtn');
      btn.innerHTML = '<span class="spinner"></span> Logging in...';
      btn.disabled = true;
      try {
        const res = await fetch('/api/auth/conductor/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        localStorage.setItem('conductorToken', data.token);
        localStorage.setItem('conductorUser',  data.username);
        localStorage.setItem('conductorName',  data.name || data.username);
        localStorage.setItem('conductorId',    data.id);
        window.location.href = '/conductor/dashboard';
      } catch(err) {
        showAlert(err.message || 'Login failed.', 'error');
        btn.innerHTML = 'Login';
        btn.disabled = false;
      }
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.style.display = 'flex';
      box.className = `alert alert-${type}`;
      box.innerHTML = (type==='error'?'❌ ':'✅ ') + msg;
    }
  </script>
</body>
</html>
